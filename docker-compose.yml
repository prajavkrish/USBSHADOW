services:
  usbshadow:
    build: .
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: "change-me"
      DATABASE_URL: "postgresql+psycopg://usbshadow:usbshadow@postgres:5432/usbshadow"
      LOG_LEVEL: "INFO"
    volumes:
      - ./evidence:/app/evidence
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: usbshadow
      POSTGRES_PASSWORD: usbshadow
      POSTGRES_DB: usbshadow
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
