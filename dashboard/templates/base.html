<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}KRZX-MYTHOZ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark app-nav sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand brand-lockup" href="{{ url_for('usbshadow.overview') }}">
          <span class="brand-mark">KX</span>
          <span class="brand-text">KRZX-MYTHOZ</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbars">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbars">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('usbshadow.overview') }}">Overview</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('usbshadow.devices_page') }}">Devices</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('usbshadow.events_page') }}">Events</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('usbshadow.incidents_page') }}">Incidents</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('usbshadow.analytics_page') }}">Analytics</a></li>
          </ul>
          <span class="navbar-text small nav-status">USB Shadow Defense Grid · {{ app_timezone }}</span>
        </div>
      </div>
    </nav>
    <main class="container-fluid py-4">
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
